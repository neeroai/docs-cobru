post:
  operationId: refreshToken
  tags:
    - Authentication
  summary: Refresh access token
  x-verification-status: verified
  description: |
    Exchange a Cobru refresh token for a short-lived access token.
    The request body field is `refresh`, not `refresh_token`.
  security:
    - ApiToken: []
      ApiSecretKey: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TokenRefreshRequest.yaml
  responses:
    '200':
      description: Access token issued
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TokenResponse.yaml
    default:
      $ref: ../components/responses/GenericError.yaml
