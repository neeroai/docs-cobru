post:
  operationId: freezeDebitCard
  tags:
    - Cards
  summary: Freeze debit card
  x-verification-status: legacy-doc
  description: Freeze or unfreeze a Cobru virtual card.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/FreezeCardRequest.yaml
  responses:
    '200':
      description: Card frozen
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CardRecord.yaml
    default:
      $ref: ../components/responses/GenericError.yaml
