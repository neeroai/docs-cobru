post:
  operationId: createCashWithdrawal
  tags:
    - Cash Withdrawals
  summary: Withdraw cash
  x-verification-status: legacy-doc
  description: Create a cash withdrawal, documented in legacy materials for Efecty.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CashWithdrawalRequest.yaml
  responses:
    '200':
      description: Cash withdrawal created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CashWithdrawalResponse.yaml
    default:
      $ref: ../components/responses/GenericError.yaml
get:
  operationId: listCashWithdrawals
  tags:
    - Cash Withdrawals
  summary: List cash withdrawals
  x-verification-status: legacy-doc
  responses:
    '200':
      description: Cash withdrawal list
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    default:
      $ref: ../components/responses/GenericError.yaml
