post:
  operationId: submitPaymentDetails
  tags:
    - Cobrus
  summary: Submit payment details
  x-verification-status: legacy-doc
  description: |
    Submit payer and payment-method-specific details for an existing cobru.

    This operation is still classified as `legacy-doc`. Its field shape is
    corroborated by Cobru's original Spotlight materials, the compiled internal
    API notes, and later deep checkout research, but Cobru has not yet replayed
    every method variant end-to-end in this repo's sandbox evidence set.

    Current confidence breakdown:
    - High confidence on the selector field name `payment`
    - High confidence on the PSE prerequisite `GET /get_banks/1/` plus `bankCode`
      mapped into the `bank` field
    - Medium confidence on Nequi and Daviplata request shapes
    - Medium confidence on card and Bancolombia button payload fields
    - Known sandbox caveat: direct `payment: "breb"` has been observed as
      commercially gated or disabled in later research, even though Spotlight
      documents it as a supported method

    Spotlight materials describe this endpoint as the checkout hub for Bre-B, PSE,
    Efecty, Corresponsal Bancolombia, Nequi, dale!, Botón Bancolombia, Daviplata,
    and credit-card flows.
  parameters:
    - in: path
      name: url
      required: true
      schema:
        type: string
      description: Cobru slug returned by `POST /cobru/`
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PaymentDetailsRequest.yaml
        examples:
          breb:
            summary: Bre-B
            value:
              payment: breb
          pse:
            summary: PSE
            value:
              name: Juan Perez
              payment: pse
              cc: '1140867070'
              email: juan@cobru.co
              document_type: CC
              phone: '300000000'
              bank: '1040'
              address: Bogotá, Colombia
          nequi:
            summary: Nequi
            value:
              name: Test Gómez
              payment: NEQUI
              cc: '1082626262'
              email: test@cobru.co
              document_type: CC
              phone: '307654332'
              phone_nequi: '307654332'
              push: true
          creditCard:
            summary: Credit card
            value:
              name: Test Gómez
              payment: credit_card
              cc: '1082626262'
              email: test@cobru.co
              document_type: CC
              phone: '307654332'
              credit_card: '4111111111111111'
              expiration_date: 12/30
              cvv: '123'
              dues: 1
  responses:
    '200':
      description: Payment details accepted
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
          examples:
            breb:
              summary: Bre-B response excerpt
              value:
                model: api.paymentorder
                fields:
                  method: breb
                  franchise: breb
                  state: PENDIENTE
                  qr_value: 9893839849384938434.COM.CRB.LLA04...
                  key_value: '@llave0343'
            checkout:
              summary: Hosted redirect response excerpt
              value:
                checkout: https://url_botonbancolombia.apps.bancolombia.com/web/transfer-gateway/checkout/url_de_bc
            daviplata:
              summary: Daviplata follow-up required
              value:
                result: OTP_REQUIRED
    default:
      $ref: ../components/responses/GenericError.yaml
