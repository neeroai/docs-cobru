type: object
properties:
  pk:
    type: integer
    example: 7821
  type:
    type: string
    example: bank_withdrawal
  state:
    type: string
    example: deposited
  amount:
    type: integer
    example: 250000
  payed_amount:
    type: integer
    example: 244350
  fee:
    type: integer
    example: 4500
  fee_iva:
    type: integer
    example: 855
  gmf:
    type: integer
    example: 295
  account_number:
    type: string
    example: "1234567890"
  description:
    type: string
    example: Supplier payout
  date_created:
    type: string
    example: '2026-04-08T14:35:00Z'
  date_consigned:
    type: string
    nullable: true
    example: '2026-04-08T15:10:00Z'
  date_deposited:
    type: string
    nullable: true
    example: '2026-04-08T16:00:00Z'
  date_rejected:
    type: string
    nullable: true
additionalProperties: true
