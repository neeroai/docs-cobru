webhooks:
  paymentStateChanged:
    post:
      tags:
        - Webhooks
      operationId: paymentStateChanged
      summary: Payment state callback
      description: |
        Cobru sends a POST request to the callback URL provided when creating a payment.
        Webhooks are not signed today, so consumers should treat them as notifications and re-check state for sensitive flows.
      x-verification-status: verified
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
      responses:
        '200':
          description: Callback received successfully
components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: Api-Token
    ApiSecretKey:
      type: apiKey
      in: header
      name: Api-Secret-Key
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
    TokenRefreshRequest:
      type: object
      required:
        - refresh
      properties:
        refresh:
          type: string
          description: Refresh token issued by Cobru
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Error en la creacion del cobru.
        detail:
          type: string
          example: payment_method_enabled must be a JSON string
      additionalProperties: true
    TokenResponse:
      type: object
      properties:
        access:
          type: string
          description: Short-lived JWT access token
      required:
        - access
    PaymentMethodsString:
      type: string
      description: |
        JSON-serialized object of enabled payment methods.
        Cobru expects this field as a string, not as a nested JSON object.
      example: '{"Bre-B":true,"pse":true,"NEQUI":true}'
    CreatePaymentRequest:
      type: object
      required:
        - amount
        - description
        - expiration_days
        - payment_method_enabled
        - payer_redirect_url
        - callback
      properties:
        amount:
          type: integer
          description: Amount in COP
          example: 50000
        description:
          type: string
          example: Order
        expiration_days:
          type: integer
          example: 1
        client_assume_costs:
          type: boolean
          default: false
        iva:
          type: number
          default: 0
        payment_method_enabled:
          $ref: '#/components/schemas/PaymentMethodsString'
        payer_redirect_url:
          type: string
          format: uri
        callback:
          type: string
          format: uri
        platform:
          type: string
          example: API
    PaymentResponse:
      type: object
      properties:
        pk:
          type: integer
          example: 27150
        amount:
          type: string
          example: '50000.00'
        state:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
        date_created:
          type: string
          format: date-time
        payment_method:
          type: string
          nullable: true
        url:
          type: string
          description: Short slug. Final payment URL is `{baseUrl}/{url}`.
          example: 3gofdf6f
        owner:
          type: string
        name:
          type: string
        payed_amount:
          type: string
          example: '47605.00'
        client_assume_costs:
          type: boolean
        payment_method_enabled:
          $ref: '#/components/schemas/PaymentMethodsString'
        expiration_days:
          type: integer
        fee_amount:
          type: integer
        fee_iva_amount:
          type: integer
        platform:
          type: string
        callback:
          type: string
        fee_iva:
          type: number
        iva_amount:
          type: number
        not_send_email:
          type: boolean
        by_topup:
          type: boolean
        bank_withdraw:
          type: string
          nullable: true
        payer_redirect_url:
          type: string
        franchise:
          type: string
          nullable: true
        idempotency_key:
          type: string
        wallet_bitcoin:
          type: string
          nullable: true
        amount_bitcoin:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
        currency_code:
          type: string
          example: COP
    PaymentDetailsRequest:
      type: object
      required:
        - name
        - payment
        - cc
        - email
        - document_type
        - phone
      properties:
        name:
          type: string
        payment:
          type: string
          description: |
            Payment method selector.
            Deep research suggests Cobru expects `payment`, not `payment_method`.
        cc:
          type: string
          description: Payer document number
        email:
          type: string
          format: email
        document_type:
          type: string
          enum:
            - CC
            - TI
            - CE
            - PAN
            - NIT
            - PASAPORTE
        phone:
          type: string
        phone_nequi:
          type: string
        push:
          type: boolean
          default: true
        bank:
          type: string
        address:
          type: string
        credit_card:
          type: string
        expiration_date:
          type: string
        cvv:
          type: string
        dues:
          type: integer
        json:
          type: boolean
          default: true
    CobruDetailResponse:
      type: object
      properties:
        fee_amount:
          type: integer
        payer_id:
          type: string
        payer_name:
          type: string
        payment_method:
          type: string
        state:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
        payer_email:
          type: string
        payment_method_enabled:
          $ref: '#/components/schemas/PaymentMethodsString'
        date_payed:
          type: string
        url:
          type: string
        amount:
          type: integer
        expiration_days:
          type: integer
        payer_phone:
          type: string
        iva_amount:
          type: number
        date_expired:
          type: integer
        date_created:
          type: integer
        images:
          type: string
          nullable: true
        description:
          type: string
        payed_amount:
          type: integer
    BankCode:
      type: object
      properties:
        bankName:
          type: string
        bankCode:
          type: string
    EstimateRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: string
          example: '5000'
        client_assume_costs:
          type: boolean
    EstimateResponse:
      type: object
      properties:
        cobru_amount:
          type: integer
        cobru_fee:
          type: integer
        iva:
          type: number
        cobru_payed_amount:
          type: integer
    EditCobruRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
        description:
          type: string
        amount:
          type: integer
        expiration_days:
          type: integer
        payment_methods:
          type: string
        fee_iva:
          type: string
    TransferRequest:
      type: object
      required:
        - to_user
        - amount
      properties:
        to_user:
          type: string
          description: Recipient phone number
        amount:
          type: integer
    CashWithdrawalRequest:
      type: object
      required:
        - method
        - document
        - amount
        - exp_days
        - name
      properties:
        method:
          type: string
          example: efecty
        document:
          type: string
        amount:
          type: string
        exp_days:
          type: string
        name:
          type: string
        coupon:
          type: string
        callback:
          type: string
          format: uri
        estimate:
          type: boolean
    CashWithdrawalResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        document:
          type: string
        ref:
          type: integer
        amount:
          type: integer
    WebhookPayload:
      type: object
      properties:
        orderId:
          type: string
        state:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
        payment_method:
          type: string
          nullable: true
        amount:
          type: string
        url:
          type: string
  responses:
    GenericError:
      description: Cobru error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
