openapi: 3.1.0
info:
  title: Cobru API
  version: 1.0.0
  description: |
    Cobru API for payments and operational money movement in Colombia.

    This OpenAPI file is currently a curated working spec built from:
    - live sandbox verification on `dev.cobru.co`
    - Cobru legacy API materials
    - Cobru API menu captures

    Verification model:
    - `x-verification-status: verified` means behavior has been validated against sandbox or first-hand integration learnings.
    - `x-verification-status: legacy-doc` means the contract comes from older Cobru materials and should be re-validated before production dependence.
    - `x-verification-status: menu-only` means the capability is visible in Cobru's API surface but the contract is still pending extraction.

    The editable source of truth lives in `openapi/src/**` and is bundled to `openapi/cobru.yaml` for runtime consumption.
  contact:
    email: soporte@cobru.co
servers:
  - url: https://prod.cobru.co
    description: Production
  - url: https://dev.cobru.co
    description: Sandbox
security:
  - ApiToken: []
    ApiSecretKey: []
    BearerAuth: []
tags:
  - name: Authentication
  - name: Cobrus
  - name: Transfers
  - name: Balance & Movements
  - name: Cash Withdrawals
  - name: Bank Withdrawals
  - name: Services
  - name: Tokenization
  - name: Cards
  - name: Celo
  - name: Whitelabel
  - name: Webhooks
paths:
  /token/refresh/:
    post:
      operationId: refreshToken
      tags:
        - Authentication
      summary: Refresh access token
      x-verification-status: verified
      description: |
        Exchange a Cobru refresh token for a short-lived access token.
        The request body field is `refresh`, not `refresh_token`.
      security:
        - ApiToken: []
          ApiSecretKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /cobru/:
    post:
      operationId: createCobru
      tags:
        - Cobrus
      summary: Create a cobru
      x-verification-status: verified
      description: |
        Create a hosted Cobru payment object.

        Important quirks:
        - `payment_method_enabled` must be a JSON string.
        - `payer_redirect_url` and `callback` should always be included.
        - the response field `url` is a short slug, not a full URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Cobru created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authentication error or misleading validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /{url}:
    post:
      operationId: submitPaymentDetails
      tags:
        - Cobrus
      summary: Generate payment details
      x-verification-status: legacy-doc
      description: |
        Submit payer and payment-method-specific details for an existing cobru.
        This contract comes from Cobru legacy API materials and deep BRE-B research.
      parameters:
        - in: path
          name: url
          required: true
          schema:
            type: string
          description: Cobru slug returned by `POST /cobru/`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentDetailsRequest'
      responses:
        '200':
          description: Payment details accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/GenericError'
  /cobru_detail/{url}:
    get:
      operationId: consultCobru
      tags:
        - Cobrus
      summary: Consult a cobru
      x-verification-status: legacy-doc
      parameters:
        - in: path
          name: url
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cobru details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobruDetailResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /get_banks/1/:
    get:
      operationId: listPseBanks
      tags:
        - Cobrus
      summary: List PSE banks
      x-verification-status: legacy-doc
      description: Retrieve available PSE bank codes.
      security: []
      responses:
        '200':
          description: PSE bank list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BankCode'
        default:
          $ref: '#/components/responses/GenericError'
  /cobru/estimate/:
    post:
      operationId: estimateCobru
