openapi: 3.1.0
info:
  title: Cobru API
  version: 1.0.0
  description: |
    Cobru API for payments and operational money movement in Colombia.

    This OpenAPI file is currently a curated working spec built from:
    - live sandbox verification on `dev.cobru.co`
    - Cobru legacy API materials
    - Cobru API menu captures

    Verification model:
    - `x-verification-status: verified` means behavior has been validated against sandbox or first-hand integration learnings.
    - `x-verification-status: legacy-doc` means the contract comes from older Cobru materials and should be re-validated before production dependence.
    - `x-verification-status: menu-only` means the capability is visible in Cobru's API surface but the contract is still pending extraction.

    The editable source of truth lives in `openapi/src/**` and is bundled to `openapi/cobru.yaml` for runtime consumption.
  contact:
    email: soporte@cobru.co
servers:
  - url: https://prod.cobru.co
    description: Production
  - url: https://dev.cobru.co
    description: Sandbox
security:
  - ApiToken: []
    ApiSecretKey: []
    BearerAuth: []
tags:
  - name: Authentication
  - name: Cobrus
  - name: Transfers
  - name: Balance & Movements
  - name: Cash Withdrawals
  - name: Bank Withdrawals
  - name: Services
  - name: Tokenization
  - name: Cards
  - name: Celo
  - name: Whitelabel
  - name: Webhooks
paths:
  /token/refresh/:
    post:
      operationId: refreshToken
      tags:
        - Authentication
      summary: Refresh access token
      x-verification-status: verified
      description: |
        Exchange a Cobru refresh token for a short-lived access token.
        The request body field is `refresh`, not `refresh_token`.
      security:
        - ApiToken: []
          ApiSecretKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /cobru/:
    post:
      operationId: createCobru
      tags:
        - Cobrus
      summary: Create a cobru
      x-verification-status: verified
      description: |
        Create a hosted Cobru payment object.

        Important quirks:
        - `payment_method_enabled` must be a JSON string.
        - `payer_redirect_url` and `callback` should always be included.
        - the response field `url` is a short slug, not a full URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Cobru created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authentication error or misleading validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /{url}:
    post:
      operationId: submitPaymentDetails
      tags:
        - Cobrus
      summary: Submit payment details
      x-verification-status: legacy-doc
      description: |
        Submit payer and payment-method-specific details for an existing cobru.

        This operation is still classified as `legacy-doc`. Its field shape is
        corroborated by Cobru's original Spotlight materials, the compiled internal
        API notes, and later deep checkout research, but Cobru has not yet replayed
        every method variant end-to-end in this repo's sandbox evidence set.

        Current confidence breakdown:
        - High confidence on the selector field name `payment`
        - High confidence on the PSE prerequisite `GET /get_banks/1/` plus `bankCode`
          mapped into the `bank` field
        - Medium confidence on Nequi and Daviplata request shapes
        - Medium confidence on card and Bancolombia button payload fields
        - Known sandbox caveat: direct `payment: "breb"` has been observed as
          commercially gated or disabled in later research, even though Spotlight
          documents it as a supported method

        Spotlight materials describe this endpoint as the checkout hub for Bre-B, PSE,
        Efecty, Corresponsal Bancolombia, Nequi, dale!, Botón Bancolombia, Daviplata,
        and credit-card flows.
      parameters:
        - in: path
          name: url
          required: true
          schema:
            type: string
          description: Cobru slug returned by `POST /cobru/`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentDetailsRequest'
            examples:
              breb:
                summary: Bre-B
                value:
                  payment: breb
              pse:
                summary: PSE
                value:
                  name: Juan Perez
                  payment: pse
                  cc: '1140867070'
                  email: juan@cobru.co
                  document_type: CC
                  phone: '300000000'
                  bank: '1040'
                  address: Bogotá, Colombia
              nequi:
                summary: Nequi
                value:
                  name: Test Gómez
                  payment: NEQUI
                  cc: '1082626262'
                  email: test@cobru.co
                  document_type: CC
                  phone: '307654332'
                  phone_nequi: '307654332'
                  push: true
              creditCard:
                summary: Credit card
                value:
                  name: Test Gómez
                  payment: credit_card
                  cc: '1082626262'
                  email: test@cobru.co
                  document_type: CC
                  phone: '307654332'
                  credit_card: '4111111111111111'
                  expiration_date: 12/30
                  cvv: '123'
                  dues: 1
      responses:
        '200':
          description: Payment details accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                breb:
                  summary: Bre-B response excerpt
                  value:
                    model: api.paymentorder
                    fields:
                      method: breb
                      franchise: breb
                      state: PENDIENTE
                      qr_value: 9893839849384938434.COM.CRB.LLA04...
                      key_value: '@llave0343'
                checkout:
                  summary: Hosted redirect response excerpt
                  value:
                    checkout: https://url_botonbancolombia.apps.bancolombia.com/web/transfer-gateway/checkout/url_de_bc
                daviplata:
                  summary: Daviplata follow-up required
                  value:
                    result: OTP_REQUIRED
        default:
          $ref: '#/components/responses/GenericError'
  /cobru/confirm_daviplata/:
    post:
      operationId: confirmDaviplataPayment
      tags:
        - Cobrus
      summary: Confirm Daviplata OTP
      x-verification-status: legacy-doc
      description: |
        Confirm a Daviplata payment after the payer receives the OTP.
        This operation is documented in the original Spotlight materials and later
        deep checkout research, but Cobru has not yet replayed a full OTP confirmation
        cycle in the sandbox evidence published by this repo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaviplataConfirmRequest'
            example:
              URL: ufa8q176
              OTP: '123456'
      responses:
        '200':
          description: Daviplata confirmation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaviplataConfirmResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /cobru_detail/{url}:
    get:
      operationId: consultCobru
      tags:
        - Cobrus
      summary: Consult a cobru
      x-verification-status: legacy-doc
      parameters:
        - in: path
          name: url
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cobru details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CobruDetailResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /get_banks/1/:
    get:
      operationId: listPseBanks
      tags:
        - Cobrus
      summary: List PSE banks
      x-verification-status: legacy-doc
      description: Retrieve available PSE bank codes.
      security: []
      responses:
        '200':
          description: PSE bank list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BankCode'
        default:
          $ref: '#/components/responses/GenericError'
  /cobru/estimate/:
    post:
      operationId: estimateCobru
      tags:
        - Cobrus
      summary: Quote a cobru
      x-verification-status: legacy-doc
      description: Estimate fees and net received amount before creating a cobru.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EstimateRequest'
      responses:
        '200':
          description: Fee quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstimateResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /edit_cobru/:
    post:
      operationId: editCobru
      tags:
        - Cobrus
      summary: Edit a cobru
      x-verification-status: legacy-doc
      description: Update mutable fields on an existing cobru.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditCobruRequest'
      responses:
        '200':
          description: Cobru updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/GenericError'
  /send/:
    post:
      operationId: sendBalance
      tags:
        - Transfers
      summary: Send balance to another Cobru user
      x-verification-status: legacy-doc
      description: |
        Transfer Cobru balance to another Cobru user. Legacy materials indicate the sender must have verified phone and email, and that the recipient is identified by phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
            examples:
              default:
                value:
                  amount: 99000
                  to_user: '3001234567'
      responses:
        '200':
          description: Transfer created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/GenericError'
    get:
      operationId: listTransfers
      tags:
        - Transfers
      summary: List transfers
      x-verification-status: legacy-doc
      description: |
        Retrieve transfers created by the authenticated Cobru user. Older materials show `from_user`, `to_user`, `amount`, and `date` fields in the response.
      responses:
        '200':
          description: Transfer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferListResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /balance/:
    get:
      operationId: getBalance
      tags:
        - Balance & Movements
      summary: Get balance
      x-verification-status: legacy-doc
      description: Retrieve account balance.
      responses:
        '200':
          description: Account balance
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/GenericError'
  /movements/movements_by_types/:
    get:
      operationId: listMovementsByType
      tags:
        - Balance & Movements
      summary: List movements by operation family
      x-verification-status: legacy-doc
      description: |
        Retrieve operational movement history with one family filter at a time.
        Spotlight documents `by_cobrus`, `by_withdraws`, `by_sends`, and `by_other_payments`.
      parameters:
        - in: query
          name: by_cobrus
          schema:
            type: boolean
        - in: query
          name: by_withdraws
          schema:
            type: boolean
        - in: query
          name: by_sends
          schema:
            type: boolean
        - in: query
          name: by_other_payments
          schema:
            type: boolean
        - in: query
          name: per_page
          schema:
            type: integer
            default: 10
        - in: query
          name: page_num
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Movement rows
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/GenericError'
  /withdraw/:
    post:
      operationId: createBankWithdrawalLegacy
      tags:
        - Cash Withdrawals
      summary: Withdraw money to a bank account
      x-verification-status: legacy-doc
      description: Legacy withdrawal flow documented before the third-party withdrawal endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Withdrawal created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/GenericError'
    get:
      operationId: listLegacyBankWithdrawals
      tags:
        - Cash Withdrawals
      summary: List legacy bank withdrawals
      x-verification-status: legacy-doc
      responses:
        '200':
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        default:
          $ref: '#/components/responses/GenericError'
  /cashwithdraw/:
    post:
      operationId: createCashWithdrawal
      tags:
        - Cash Withdrawals
      summary: Withdraw cash
      x-verification-status: legacy-doc
      description: |
        Create a cash withdrawal. The best-known public contract is documented for Efecty and supports optional callback and estimate fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashWithdrawalRequest'
            examples:
              efecty:
                value:
                  amount: '10000'
                  document: '213232323'
                  estimate: false
                  exp_days: '30'
                  method: efecty
                  name: Testeo efecty
      responses:
        '200':
          description: Cash withdrawal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashWithdrawalResponse'
        default:
          $ref: '#/components/responses/GenericError'
    get:
      operationId: listCashWithdrawals
      tags:
        - Cash Withdrawals
      summary: List cash withdrawals
      x-verification-status: legacy-doc
      description: |
        Retrieve cash withdrawals for the authenticated account. Legacy materials expose state codes and callback information in the listing payload.
      responses:
        '200':
          description: Cash withdrawal list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashWithdrawalListResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /cashwithdraw/{id}:
    get:
      operationId: getCashWithdrawal
      tags:
        - Cash Withdrawals
      summary: Get cash withdrawal by ID
      x-verification-status: legacy-doc
      description: Retrieve the detail view of one cash withdrawal.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Cobru cash-withdrawal identifier.
      responses:
        '200':
          description: Cash withdrawal detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashWithdrawalListItem'
        default:
          $ref: '#/components/responses/GenericError'
  /cancelcashwithdraw/:
    post:
      operationId: cancelCashWithdrawal
      tags:
        - Cash Withdrawals
      summary: Cancel cash withdrawal
      x-verification-status: legacy-doc
      description: Cancel a previously created cash withdrawal before pickup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashWithdrawalCancelRequest'
            examples:
              default:
                value:
                  id: 123456
      responses:
        '200':
          description: Cash withdrawal cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashWithdrawalCancelResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /bank_list_third_party_withdraw/:
    get:
      operationId: listThirdPartyWithdrawalBanks
      tags:
        - Bank Withdrawals
      summary: List available banks for third-party withdrawals
      x-verification-status: legacy-doc
      description: |
        Retrieve the bank catalog used by the legacy Colombian third-party withdrawal flow.
      responses:
        '200':
          description: Bank list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyWithdrawalBanksResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /thirdpartywithdraw/:
    post:
      operationId: createThirdPartyWithdrawal
      tags:
        - Bank Withdrawals
      summary: Create bank withdrawal to a third party
      x-verification-status: legacy-doc
      description: |
        Create a bank withdrawal using the best-known Colombian third-party payout contract from legacy Cobru materials. Supports beneficiary banking details, optional callback, and optional idempotency key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThirdPartyWithdrawalRequest'
            examples:
              colombia:
                value:
                  amount: 250000
                  account_holder_name: Maria Perez
                  account_type: savings
                  account_holder_document: '1029384756'
                  account_holder_document_type: CC
                  account_number: '1234567890'
                  account_phone: '3001234567'
                  account_email: maria@example.com
                  bank_name: Bancolombia
                  description: Supplier payout
                  callback: https://merchant.example/webhooks/withdrawals
                  idempotency_key: wd_2026_04_08_0001
      responses:
        '200':
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyWithdrawalRecord'
        default:
          $ref: '#/components/responses/GenericError'
    get:
      operationId: listThirdPartyWithdrawals
      tags:
        - Bank Withdrawals
      summary: List third-party withdrawals
      x-verification-status: legacy-doc
      description: |
        Retrieve previously created third-party withdrawals. Legacy materials mention querying by idempotency key in addition to standard list retrieval.
      parameters:
        - in: query
          name: idempotency_key
          required: false
          schema:
            type: string
          description: Optional idempotency key used to find a previously submitted payout.
      responses:
        '200':
          description: Withdrawal list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyWithdrawalListResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /thirdpartywithdraw/{id}:
    get:
      operationId: getThirdPartyWithdrawal
      tags:
        - Bank Withdrawals
      summary: Get third-party withdrawal by ID
      x-verification-status: legacy-doc
      description: Retrieve the latest state and details for one third-party bank withdrawal.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Cobru bank-withdrawal identifier.
      responses:
        '200':
          description: Withdrawal detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyWithdrawalRecord'
        default:
          $ref: '#/components/responses/GenericError'
  /cancelthirdpartywithdraw/:
    post:
      operationId: cancelThirdPartyWithdrawal
      tags:
        - Bank Withdrawals
      summary: Cancel third-party withdrawal
      x-verification-status: legacy-doc
      description: Cancel a previously created third-party bank withdrawal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThirdPartyWithdrawalCancelRequest'
            examples:
              default:
                value:
                  id: 7821
      responses:
        '200':
          description: Withdrawal cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashWithdrawalCancelResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /panel/detail_withdraw_pdf/:
    get:
      operationId: getThirdPartyWithdrawalPdf
      tags:
        - Bank Withdrawals
      summary: Get third-party withdrawal PDF
      x-verification-status: legacy-doc
      parameters:
        - in: query
          name: withdraw_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Withdrawal PDF or download metadata
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/GenericError'
  /withdraw/co/:
    post:
      operationId: createBreBTransfer
      tags:
        - Bank Withdrawals
      summary: Create BRE-B transfer
      x-verification-status: legacy-doc
      description: |
        Candidate endpoint for BRE-B-linked bank movement in Colombia. The exact request and settlement model still require fresh validation with Cobru.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BreBWithdrawalRequest'
      responses:
        '200':
          description: BRE-B transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyWithdrawalRecord'
        default:
          $ref: '#/components/responses/GenericError'
  /withdraw/br/:
    post:
      operationId: createBankWithdrawalBrazil
      tags:
        - Bank Withdrawals
      summary: Create bank withdrawal to Brazil
      x-verification-status: legacy-doc
      description: |
        Create a Brazil payout using the legacy Cobru export built around PIX keys and CPF/CNPJ identity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankWithdrawalBrazilRequest'
      responses:
        '200':
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyWithdrawalRecord'
        default:
          $ref: '#/components/responses/GenericError'
  /withdraw/ar/:
    post:
      operationId: createBankWithdrawalArgentina
      tags:
        - Bank Withdrawals
      summary: Create bank withdrawal to Argentina
      x-verification-status: legacy-doc
      description: |
        Create an Argentina payout using the legacy Cobru export built around `cbu` or `cvu` destination identifiers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankWithdrawalArgentinaRequest'
      responses:
        '200':
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyWithdrawalRecord'
        default:
          $ref: '#/components/responses/GenericError'
  /withdraw/mx/:
    post:
      operationId: createBankWithdrawalMexico
      tags:
        - Bank Withdrawals
      summary: Create bank withdrawal to Mexico
      x-verification-status: legacy-doc
      description: |
        Create a Mexico payout using the legacy Cobru export built around CLABE and beneficiary name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankWithdrawalMexicoRequest'
      responses:
        '200':
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThirdPartyWithdrawalRecord'
        default:
          $ref: '#/components/responses/GenericError'
  /request_service_reload/:
    post:
      operationId: rechargeCellPhone
      tags:
        - Services
      summary: Recharge a mobile phone
      x-verification-status: legacy-doc
      description: |
        Recharge a mobile phone line using Cobru's digital-services surface. Legacy materials mention operators such as Claro, Movistar, Tigo, and Avantel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RechargeRequest'
      responses:
        '200':
          description: Recharge accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RechargeResponse'
        default:
          $ref: '#/components/responses/GenericError'
  /pines/all_pines/:
    get:
      operationId: listPinProducts
      tags:
        - Services
      summary: List PIN products
      x-verification-status: legacy-doc
      description: Retrieve the PIN product catalog. Legacy materials also mention filtering by operator.
      parameters:
        - in: query
          name: operator
          required: false
          schema:
            type: string
          description: Optional operator filter.
      responses:
        '200':
          description: PIN catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        default:
          $ref: '#/components/responses/GenericError'
  /pin/:
    post:
      operationId: buyPinProduct
      tags:
        - Services
      summary: Buy PIN product
      x-verification-status: legacy-doc
      description: Purchase a PIN-based digital product from Cobru.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuyPinRequest'
      responses:
        '200':
          description: PIN purchase result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyPinResponse'
        default:
