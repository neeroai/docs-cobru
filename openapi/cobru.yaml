          description: Placeholder success response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /cards/movements:
    get:
      operationId: listCardMovements
      tags: [Cards]
      summary: List card movements
      x-verification-status: menu-only
      responses:
        '200':
          description: Placeholder success response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /cards/freeze:
    post:
      operationId: freezeCard
      tags: [Cards]
      summary: Freeze card
      x-verification-status: menu-only
      responses:
