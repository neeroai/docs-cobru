name: Localization Sync

on:
  pull_request:
    paths:
      - "content/docs/**"
      - "openapi/**"
      - "scripts/validate-content-sync.mjs"
      - "scripts/validate-openapi-locales.mjs"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - "content/docs/**"
      - "openapi/**"
      - "scripts/validate-content-sync.mjs"
      - "scripts/validate-openapi-locales.mjs"
      - "package.json"
      - "bun.lock"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate EN/ES content sync
        run: bun run content:check:sync

      - name: Validate EN/ES API metadata sync
        run: bun run openapi:check:locales
